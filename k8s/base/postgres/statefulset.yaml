apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: misskey
  labels:
    app: postgres
    app.kubernetes.io/component: database
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/component: database
    spec:
      # NOTE on password management:
      # POSTGRES_PASSWORD only takes effect on FIRST initialization
      # (empty data directory). After that, changing the Secret does
      # NOT update the database password.
      #
      # To rotate the password:
      #   1. Update secrets.env with the new password
      #   2. kubectl apply -k k8s/overlays/production
      #   3. kubectl exec -n misskey postgres-0 -- \
      #        psql -U misskey -d misskey -c \
      #        "ALTER USER misskey PASSWORD 'new-password';"
      #   4. kubectl rollout restart deployment/misskey -n misskey
      containers:
        - name: postgres
          image: postgres:18-alpine
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - configMapRef:
                name: postgres-config
            - secretRef:
                name: postgres-secret
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U misskey -d misskey
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U misskey -d misskey
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi
