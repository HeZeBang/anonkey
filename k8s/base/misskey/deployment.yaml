apiVersion: apps/v1
kind: Deployment
metadata:
  name: misskey
  namespace: misskey
  labels:
    app: misskey
    app.kubernetes.io/component: web
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: misskey
  template:
    metadata:
      labels:
        app: misskey
        app.kubernetes.io/component: web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 991
        runAsGroup: 991
        fsGroup: 991
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - misskey
                topologyKey: kubernetes.io/hostname
      initContainers:
        # Inject secrets into the config template.
        # ConfigMap (read-only) has __PLACEHOLDER__ tokens;
        # this container reads the template + Secret env vars
        # and writes the resolved config to an emptyDir volume.
        - name: inject-secrets
          image: busybox:1.37
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: meilisearch-secret
                  key: MEILI_MASTER_KEY
            - name: SETUP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: misskey-secret
                  key: SETUP_PASSWORD
                  optional: true
          command:
            - sh
            - -c
            - |
              sed \
                -e "s|__POSTGRES_PASSWORD__|${POSTGRES_PASSWORD}|g" \
                -e "s|__MEILI_MASTER_KEY__|${MEILI_MASTER_KEY}|g" \
                -e "s|__SETUP_PASSWORD__|${SETUP_PASSWORD:-}|g" \
                /config-template/default.yml > /config-out/default.yml
              echo "Config injected."
          volumeMounts:
            - name: misskey-config-template
              mountPath: /config-template
              readOnly: true
            - name: misskey-config
              mountPath: /config-out
        - name: wait-for-postgres
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
        - name: wait-for-redis
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do
                echo "Waiting for Redis..."
                sleep 2
              done
      containers:
        - name: misskey
          image: misskey:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
          volumeMounts:
            - name: misskey-config
              mountPath: /misskey/.config
              readOnly: true
            - name: misskey-files
              mountPath: /misskey/files
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
      volumes:
        - name: misskey-config-template
          configMap:
            name: misskey-config
        - name: misskey-config
          emptyDir: {}
        - name: misskey-files
          persistentVolumeClaim:
            claimName: misskey-files-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: misskey-files-pvc
  namespace: misskey
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
