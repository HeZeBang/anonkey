apiVersion: apps/v1
kind: Deployment
metadata:
  name: meilisearch
  namespace: misskey
  labels:
    app: meilisearch
    app.kubernetes.io/component: search
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meilisearch
  template:
    metadata:
      labels:
        app: meilisearch
        app.kubernetes.io/component: search
    spec:
      containers:
        - name: meilisearch
          image: getmeili/meilisearch:v1.13
          ports:
            - containerPort: 7700
              name: http
          env:
            - name: MEILI_ENV
              value: "production"
            - name: MEILI_NO_ANALYTICS
              value: "true"
            - name: MEILI_HTTP_ADDR
              value: "0.0.0.0:7700"
            - name: MEILI_MAX_THREADS
              value: "2"
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: meilisearch-secret
                  key: MEILI_MASTER_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: 7700
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 7700
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "1Gi"
              cpu: "250m"
            limits:
              memory: "3Gi"
              cpu: "1000m"
          volumeMounts:
            - name: meilisearch-data
              mountPath: /meili_data
      volumes:
        - name: meilisearch-data
          persistentVolumeClaim:
            claimName: meilisearch-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: meilisearch-pvc
  namespace: misskey
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
