apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: misskey

resources:
  - ../../base

# Generate misskey-config ConfigMap from the config file
configMapGenerator:
  - name: misskey-config
    files:
      - default.yml=config/default.yml
    options:
      labels:
        app: misskey

# Generate secrets from .env file (gitignored)
# Copy secrets.env.example to secrets.env and fill in real values
generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: postgres-secret
    envs:
      - secrets.env
    options:
      labels:
        app: postgres
  - name: meilisearch-secret
    envs:
      - secrets.env
    options:
      labels:
        app: meilisearch
  - name: misskey-secret
    envs:
      - secrets.env
    options:
      labels:
        app: misskey

# Override image tags for production
images:
  - name: misskey
    newName: ghcr.io/hezebang/anonkey
    newTag: latest
  - name: postgres
    newTag: "18-alpine"
  - name: redis
    newTag: "7-alpine"
  - name: getmeili/meilisearch
    newTag: "v1.13"
